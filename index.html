<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Cachetona 🌻</title>
    <style>
/* --- TU CÓDIGO ORIGINAL SIN TOCAR --- */
*,
*::after,
*::before {
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}

:root {
  --dark-color: #000;
  --fl-speed: 0.8s;
  --speed-leaf: 2s;
}

body {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  min-height: 100vh;
  background-color: var(--dark-color);
  overflow: hidden;
  perspective: 1000px;
}

.night {
  position: fixed;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  width: 100%;
  height: 100%;
  filter: blur(0.1vmin);
  background-image: radial-gradient(
      ellipse at top,
      transparent 0%,
      var(--dark-color)
    ),
    radial-gradient(
      ellipse at bottom,
      var(--dark-color),
      rgba(145, 233, 255, 0.2)
    ),
    repeating-linear-gradient(
      220deg,
      rgb(0, 0, 0) 0px,
      rgb(0, 0, 0) 19px,
      transparent 19px,
      transparent 22px
    ),
    repeating-linear-gradient(
      189deg,
      rgb(0, 0, 0) 0px,
      rgb(0, 0, 0) 19px,
      transparent 19px,
      transparent 22px
    ),
    repeating-linear-gradient(
      148deg,
      rgb(0, 0, 0) 0px,
      rgb(0, 0, 0) 19px,
      transparent 19px,
      transparent 22px
    ),
    linear-gradient(90deg, rgb(0, 255, 250), rgb(240, 240, 240));
}

.shooting-stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

.shooting-star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.8);
  opacity: 0;
  animation: shootingStar 3s linear infinite;
}

.shooting-star::before {
  content: '';
  position: absolute;
  top: 50%;
  right: 0;
  transform: translateY(-50%);
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 1) 100%);
  animation: shootingStarTail 3s linear infinite;
}

.shooting-star:nth-child(1) { top: 5%; left: -10%; animation-delay: 0s; animation-duration: 2.5s; }
.shooting-star:nth-child(2) { top: 15%; left: -10%; animation-delay: 2s; animation-duration: 3s; }
.shooting-star:nth-child(3) { top: 25%; left: -10%; animation-delay: 4s; animation-duration: 2.8s; }
.shooting-star:nth-child(4) { top: 0%; left: -10%; animation-delay: 6s; animation-duration: 3.2s; }
.shooting-star:nth-child(5) { top: 35%; left: -10%; animation-delay: 8s; animation-duration: 2.7s; }
.shooting-star:nth-child(6) { top: 8%; left: -10%; animation-delay: 10s; animation-duration: 3.1s; }
.shooting-star:nth-child(7) { top: 45%; left: -10%; animation-delay: 12s; animation-duration: 2.9s; }
.shooting-star:nth-child(8) { top: 3%; left: -10%; animation-delay: 14s; animation-duration: 3.3s; }

@keyframes shootingStar {
  0% { opacity: 0; transform: translateX(0) translateY(0) rotate(45deg); }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { opacity: 0; transform: translateX(120vw) translateY(50vh) rotate(10deg); }
}

@keyframes shootingStarTail {
  0% { width: 0; }
  30% { width: 100px; }
  100% { width: 0; }
}

.flowers { position: relative; transform: scale(0.9); z-index: 2; }
.flower { position: absolute; bottom: 10vmin; transform-origin: bottom center; z-index: 50; }
.flower--1 { animation: moving-flower-1 4s linear infinite; }
.flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
.flower--2 { left: 50%; transform: rotate(20deg); animation: moving-flower-2 4s linear infinite; }
.flower--2 .flower__line { height: 60vmin; animation-delay: 0.6s; }
.flower--3 { left: 50%; transform: rotate(-15deg); animation: moving-flower-3 4s linear infinite; }
.flower--4 { left: -25%; z-index: -6; transform: rotate(10deg); animation: moving-flower-4 3.5s linear infinite; }
.flower--4 .flower__line { height: 90vmin; animation-delay: 1.2s; }
.flower--5 { left: 75%; z-index: -7; transform: rotate(-25deg); animation: moving-flower-5 4.5s linear infinite; }
.flower--5 .flower__line { height: 85vmin; animation-delay: 1.9s; }

.flower__leafs { position: relative; animation: blooming-flower 2s backwards; }
.flower__leafs::after {
  content: ""; position: absolute; left: 0; top: 0; transform: translate(-50%, -100%);
  width: 8vmin; height: 8vmin; background-color: #6bf0ff; filter: blur(10vmin);
}

.flower__leaf {
  position: absolute; bottom: 0; left: 50%; width: 23vmin; height: 6vmin;
  border-radius: 60% 40% 60% 40%; background-color: #ffd700;
  background-image: linear-gradient(to top, #ff8c00, #ffd700, #ffff00);
  transform-origin: bottom center; opacity: 0.95;
  box-shadow: inset 0 0 1vmin rgba(255, 255, 255, 0.7), 0 0 3vmin rgba(255, 215, 0, 0.4);
  z-index: 2;
}

.flower__white-circle {
  position: absolute; left: -4vmin; top: -4vmin; width: 10vmin; height: 10vmin;
  border-radius: 50%; background-color: #8b4513;
  background-image: radial-gradient(circle at 30% 30%, #654321, #8b4513, #2f1b14);
  box-shadow: inset 0 0 2vmin rgba(0, 0, 0, 0.8), 0 0 1vmin rgba(139, 69, 19, 0.6);
}

.flower__line {
  height: 55vmin; width: 2vmin;
  background-image: linear-gradient(to left, rgb(0, 0, 0, 0.3), transparent, rgba(255, 255, 255, 0.2)),
                    linear-gradient(to top, transparent 10%, #2d5016, #4a7c23, #6b8e23);
  box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.7);
  animation: grow-flower-tree 4s backwards;
}

/* Animaciones de carga */
.not-loaded * { animation-play-state: paused !important; }
@keyframes grow-flower-tree { 0% { height: 0; border-radius: 1vmin; } }
@keyframes blooming-flower { 0% { transform: scale(0); } }
@keyframes moving-flower-1 { 0%, 100% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } }
@keyframes moving-flower-2 { 0%, 100% { transform: rotate(18deg); } 50% { transform: rotate(14deg); } }
@keyframes moving-flower-3 { 0%, 100% { transform: rotate(-18deg); } 50% { transform: rotate(-20deg) rotateY(-10deg); } }
@keyframes moving-flower-4 { 0%, 100% { transform: rotate(9deg); } 50% { transform: rotate(12deg) rotateY(9deg); } }
@keyframes moving-flower-5 { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(-11deg) rotateY(5deg); } }

/* --- AÑADIDOS NUEVOS (CARTA Y MÚSICA) --- */
.contenedor-carta {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 450px;
    background: rgba(20, 20, 20, 0.95);
    padding: 40px;
    border-radius: 20px;
    border: 3px solid #ffd700;
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
    text-align: center;
    z-index: 2000;
    font-family: 'Trebuchet MS', sans-serif;
    color: #fff;
    transition: all 1.5s ease;
}

.contenedor-carta h1 { color: #ffd700; font-size: 1.8rem; margin-bottom: 20px; }
.contenedor-carta p { font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px; font-style: italic; }

.btn-regalo {
    background: #ffd700;
    color: #000;
    border: none;
    padding: 15px 30px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
    transition: transform 0.3s;
}

.btn-regalo:hover { transform: scale(1.1); }
.ocultar { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body class="not-loaded">
  
  <div id="carta" class="contenedor-carta">
      <h1>Hola, mi amor... 🌻</h1>
      <p>Dicen que los detalles más sencillos son los que más duran. Quería regalarte algo que nunca se marchite, para que te acuerdes de mí cada vez que lo veas.<br><br><b>Te amo mucho, mi cachetona.</b></p>
      <button class="btn-regalo" onclick="abrirRegalo()">Ver mi regalo</button>
  </div>

  <audio id="musicaFondo" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
  </audio>

  <div class="night"></div>
  
  <div class="shooting-stars">
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
  </div>
  
  <div class="flowers">
    <div class="flower flower--1">
      <div class="flower__leafs">
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(0deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(30deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(60deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(90deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(120deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(150deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(180deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(210deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(240deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(270deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(300deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(330deg);"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <div class="flower flower--2">
      <div class="flower__leafs">
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(0deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(45deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(90deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(135deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(180deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(225deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(270deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(315deg);"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>

    <div class="flower flower--3">
      <div class="flower__leafs">
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(15deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(65deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(115deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(165deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(215deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(265deg);"></div>
        <div class="flower__leaf" style="transform: translate(-50%, -10%) rotate(315deg);"></div>
        <div class="flower__white-circle"></div>
      </div>
      <div class="flower__line"></div>
    </div>
  </div>

  <script>
    function abrirRegalo() {
        // Ocultar la carta con efecto
        document.getElementById('carta').classList.add('ocultar');
        
        // Arrancar animaciones originales
        document.body.classList.remove('not-loaded');
        
        // Reproducir música
        const audio = document.getElementById('musicaFondo');
        audio.play().catch(e => console.log("Audio play blocked"));
    }
  </script>
</body>
</html>
